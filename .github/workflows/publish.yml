# Name des Workflows
name: Publish

on:
  # Automatischer Start: Alle 3 Tage um 02:00 Uhr
  schedule:
    - cron: '0 2 */3 * *'
  
  # NEU: Erlaubt es dir, den Workflow jederzeit manuell 
  # über die GitHub-Webseite zu starten.
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    
    steps:
      # Repository auschecken (v4 ist aktuell)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Node.js 20 einrichten (behebt den 'node:path' Fehler)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: engine/package-lock.json

      # Abhängigkeiten installieren
      - name: Install Dependencies
        working-directory: engine
        run: npm install

      # Gulp Prozess für die Übersetzung
      - name: Run Gulp Translation
        working-directory: engine
        run: npx gulp
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      # Änderungen committen
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          # Nur committen, wenn sich tatsächlich etwas geändert hat
          git diff-index --quiet HEAD || git commit -m "Automated translation update" -a

      # Änderungen zurückschreiben
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
